---
name: Haskell CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6.7"
          cabal-version: "3.14"

      - name: Cache cabal store
        uses: actions/cache@v5
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: >-
            ${{ runner.os }}-cabal-${{
            hashFiles('wordfrequency.cabal',
            'cabal.project') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      - name: Install dependencies
        run: make setup

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Haddock
        run: make doc

      - name: Benchmark
        run: make bench

      - name: Upload pages artifact
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
